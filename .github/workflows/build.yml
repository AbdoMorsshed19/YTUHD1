name: Build YTUHD and Trigger YTLitePlusEXTRA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTUHD .deb
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Install dependencies
        run: brew install make ldid

      - name: Set PATH environment variables
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Clone Theos
        run: git clone --quiet --depth=1 --recurse-submodules https://github.com/roothide/theos.git

      - name: Download iOS SDK
        run: |
          git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/Tonwalter888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS18.6.sdk
          git checkout
          mv *.sdk $THEOS/sdks

      - name: Clone YouTubeHeader
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git $THEOS/include/YouTubeHeader

      - name: Clone PSHeader
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git $THEOS/include/PSHeader

      - name: Clone YTVideoOverlay
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Clone YTUHD
        run: git clone --quiet --depth=1 https://github.com/AbdoMorsshed19/YTUHD.git YTUHD

      - name: Build YTUHD
        run: |
          cd YTUHD
          echo "YTUHD_VERSION=$(grep '^Version:' control | cut -d ' ' -f2)" >> $GITHUB_ENV
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          cp packages/*.deb ${{ github.workspace }}/ytuhd-rootless.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTUHD-v${{ env.YTUHD_VERSION }}
          path: ${{ github.workspace }}/ytuhd-rootless.deb
          if-no-files-found: error

  trigger-ytliteplusextra:
    name: Trigger YTLitePlusEXTRA Build
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to AbdoMorsshed19/YTLitePlusEXTRA
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AbdoMorsshed19/YTLitePlusEXTRA/dispatches \
            -d '{"event_type":"ytuhd-updated"}' \
            --fail-with-body
