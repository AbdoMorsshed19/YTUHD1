name: Trigger YTLite build
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    name: Dispatch to Swept-Forks/YTLite
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Swept-Forks/YTLite/dispatches \
            -d '{"event_type":"trigger-build"}' \
            --fail-with-body
